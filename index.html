    <script type="text/javascript">
    	function openInstructions() {
    		window.open("instructions.html", "Instructions", 'resizable=0, width=720, height=700'); 
    	}

      function postContentByGame(slideId) {
      		document.getElementById("container-1").style.visibility = "hidden";
            var youtube = JSON.parse(sessionStorage.getItem('youtube')); 
            var twitch = JSON.parse(sessionStorage.getItem('twitch'));
            var streamer = twitch[slideId];
            var game = youtube[slideId];
            var key = Object.keys(game);
            var gameName = key[0];
            var gameData = game[gameName];
            var keyTwitch = Object.keys(streamer);
            var gameNameTwitch = key[0];
            var streamerData = streamer[gameNameTwitch];
            $('#gamepic'+slideId).attr('src', 'https://static-cdn.jtvnw.net/ttv-boxart/'+gameName+'-185x280.jpg');

            //Add content to slide

            //Youtube
            var rowIndex = -1;
            $('#slideCarousel'+slideId+' .carousel-inner').empty();
            for(var i = 0; i < gameData.length; i++) {
            if(i % 4 === 0) {
              rowIndex++;
              if(i === 0) {
                $('#slideCarousel'+slideId+' .carousel-inner').append('<div class="item active" id=row'+rowIndex+'><div class="row"></div></div>');
              }
              else {
                $('#slideCarousel'+slideId+' .carousel-inner').append('<div class="item" id=row'+rowIndex+'><div class="row"></div></div>');
              }
            }
            console.log(rowIndex);
             $('#slideCarousel'+slideId+' .carousel-inner .item[id=row'+rowIndex+'] .row').append('<div class="col-sm-3"><iframe width="426" height="240" src="https://www.youtube.com/embed/'+gameData[i].videoId+'" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>');    
          }


          //Twitch
          for(var i = 0; i < streamerData.length; i++){
            $('#stream'+i+'_game'+slideId).attr('src', 'https://player.twitch.tv/?autoplay=false&channel='+streamerData[i].channel_name+'&parent=sveningvarstechsupport.com');
          }


      }

    function getContentByGameName(){
        return function() {
         
    $.ajax({
      method: "GET",
      url: 'http://localhost:5000/api/v1/content/game/' + document.getElementById("search_bar").value,
      headers: {"Accept": "application/json"}
    })
    .done(function(data) {
    var youtube = data.Youtube;
    sessionStorage.setItem('youtube', JSON.stringify(youtube));
    var twitch = data.Twitch;
    sessionStorage.setItem('twitch', JSON.stringify(twitch));

    hideSlideContainers();
    for(var i = 0; i<1; i++) {
      document.getElementById("container"+i).style.visibility = "visible";
      postContentByGame(i);
    }

    }).fail(function (jqXHR, textStatus, errorThrown) {
    	alert("ERR_CONNECTION_REFUSED");
    });
  }
}

function hideSlideContainers() {
    document.getElementById("container0").style.visibility = "hidden";
    document.getElementById("container1").style.visibility = "hidden";
    document.getElementById("container2").style.visibility = "hidden";
}


      function getContentFromSteamID(){
        return function() {
         
    $.ajax({
      method: "GET",
      url: 'http://localhost:5000/api/v1/content/steam/' + document.getElementById('SteamID').value,
      headers: {"Accept": "application/json"}
    })
    .done(function(data) {
    if(data.status === "success") {
    var youtube = data.Youtube;
    sessionStorage.setItem('youtube', JSON.stringify(youtube));
     var twitch = data.Twitch;
    sessionStorage.setItem('twitch', JSON.stringify(twitch));

    hideSlideContainers();
    for(var i = 0; i<youtube.length; i++) {
      document.getElementById("container"+i).style.visibility = "visible";
      postContentByGame(i);
    	}
	}
 	else {
   		alert(data.message);
   		}
    }).fail(function (jqXHR, textStatus, errorThrown) {
    	alert("ERR_CONNECTION_REFUSED");
    });
  }
}

  function getGenericContent(){
    return function() {
         
    $.ajax({
      method: "GET",
      url: 'http://localhost:5000/api/v1/content',
      headers: {"Accept": "application/json"}
    })
    .done(function(data) {
    var youtube = data.Youtube;
    sessionStorage.setItem('youtube', JSON.stringify(youtube));
     var twitch = data.Twitch;
    sessionStorage.setItem('twitch', JSON.stringify(twitch));

    hideSlideContainers();
    for(var i = 0; i<youtube.length; i++) {
      document.getElementById("container"+i).style.visibility = "visible";
      postContentByGame(i);
    }
    }).fail(function (jqXHR, textStatus, errorThrown) {
    	alert("ERR_CONNECTION_REFUSED");
    });
  }
}



    $(document).ready(function () {
    $('#SteamButton').click(getContentFromSteamID());
    $('#searchButton').click(getContentByGameName());
    $('#genericButton').click(getGenericContent());
    hideSlideContainers();
